steps:
  # ── Jobs image ──────────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/elec-jobs:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/elec-jobs:latest
      - -f
      - infra/cloudrun/Dockerfile.jobs
      - .

  - name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/elec-jobs"]

  # ── Dashboard image ─────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/elec-dashboard:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/elec-dashboard:latest
      - -f
      - apps/dashboard/Dockerfile
      - .

  - name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/elec-dashboard"]

  # ── MLflow image ─────────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/elec-mlflow:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/elec-mlflow:latest
      - -f
      - apps/mlflow/Dockerfile
      - .

  - name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/elec-mlflow"]

  # ── Redeploy Cloud Run Jobs ──────────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        for JOB in ingest features forecast metrics reingest train; do
          gcloud run jobs update $$JOB \
            --image ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/elec-jobs:${SHORT_SHA} \
            --region ${_REGION} \
            --project ${PROJECT_ID} \
            --quiet
        done

  # ── Redeploy Cloud Run Services ──────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - elec-dashboard
      - --image
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/elec-dashboard:${SHORT_SHA}
      - --region
      - ${_REGION}
      - --project
      - ${PROJECT_ID}
      - --quiet

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - elec-mlflow
      - --image
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/elec-mlflow:${SHORT_SHA}
      - --region
      - ${_REGION}
      - --project
      - ${PROJECT_ID}
      - --quiet

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/elec-jobs:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/elec-jobs:latest
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/elec-dashboard:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/elec-dashboard:latest
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/elec-mlflow:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/elec-mlflow:latest

substitutions:
  _REGION: europe-west9
  _REPO: elec-forecast

options:
  logging: CLOUD_LOGGING_ONLY
